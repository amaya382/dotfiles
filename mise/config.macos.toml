# macOS-only extras. Merged into the config chain automatically on macOS
# when auto_env = true is set in ~/.miserc.toml (see [dotfiles] entry in
# config.toml). Merging is additive with config.toml: keys form a union.

[bootstrap.packages]
# Needed by tmux when spawning macOS's system zsh as a child.
# The formula does not exist on Linux, so declare it here only.
"brew:reattach-to-user-namespace" = "latest"

# GNU coreutils-style tools missing (or shipped as BSD variants) on macOS.
# Not needed on Linux where apt/dnf ship the GNU flavor as the default awk / grep / sed.
# Available on PATH as gawk / ggrep / gsed.
"brew:gawk"    = "latest"
"brew:grep"    = "latest"
"brew:gnu-sed" = "latest"

# ---------------------------------------------------------------------------
# Login shell
# macOS ships zsh at /bin/zsh; the /usr/bin/zsh path used on Linux does not
# exist here. Prefer the system zsh over a brew-installed one so the shell
# stays in place even when Homebrew is absent or being reinstalled.
# ---------------------------------------------------------------------------
[bootstrap.user]
login_shell = "/bin/zsh"
